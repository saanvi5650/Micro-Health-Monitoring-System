<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Health Monitor</title>
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="auth-page">

<div class="auth-box">

  <div class="auth-logo">
    <div class="logo-mark">🏥</div>
    <h1>Health Monitor</h1>
    <p>Create your account</p>
  </div>

  <div class="auth-card">
    <h2>Get started</h2>
    <p class="auth-subtitle">Fill in your details to register</p>

    <form onsubmit="registerUser(event)">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input class="form-control" type="text" id="name"
               placeholder="Name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" id="email"
               placeholder="you@example.com" required autocomplete="email">
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password"
               placeholder="Minimum 6 characters" required autocomplete="new-password">
        <span class="form-error" id="passError"></span>
      </div>

      <div class="form-group">
        <label for="role">Account Type</label>
        <select class="form-control" id="role">
          <option value="citizen">Citizen</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" type="submit" id="registerBtn" style="margin-top:8px;">
        Create Account
      </button>

    </form>

    <div class="auth-footer" style="margin-top:20px;">
      Already have an account? <a href="citizen-login.html">Sign in</a>
    </div>

  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/register.js"></script>
</body>
</html>
