<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Health Monitor</title>
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body class="auth-page">

<div class="auth-box">

  <div class="auth-logo">
    <div class="logo-mark">🏥</div>
    <h1>Health Monitor</h1>
    <p>Micro Health System</p>
  </div>

  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your citizen account</p>

    <form onsubmit="citizenLogin(event)">

      <div class="form-group">
        <label for="citizenEmail">Email Address</label>
        <input class="form-control" type="email" id="citizenEmail"
               placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="citizenPassword">Password</label>
        <input class="form-control" type="password" id="citizenPassword"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px;">
        Sign In
      </button>

    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div class="auth-footer" style="margin-top:10px;">
      Admin? <a href="admin-login.html">Admin login →</a>
    </div>

  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
