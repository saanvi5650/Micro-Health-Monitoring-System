<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Health Data — Health Monitor</title>
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

<div class="app-layout">
<aside class="sidebar">
  <div class="sidebar-brand">
    <h2>🏥 HealthMonitor</h2>
    <span class="role-badge">Citizen</span>
  </div>
  <nav>
    <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a href="monitoring.html"><span class="icon">📡</span> Monitoring</a>
    <a href="alerts.html"><span class="icon">🔔</span> Alerts</a>
    <a href="analytics.html" class="active"><span class="icon">📈</span> Submit Data</a>
  </nav>
  <div class="sidebar-footer">
    <a href="#" onclick="logout()">🚪 Sign Out</a>
  </div>
</aside>

<main class="page-content">

  <div class="page-header">
    <h1>Submit Health Data</h1>
    <p>Fill in your current readings to receive a risk assessment.</p>
  </div>

  <div style="max-width:600px;">
    <div class="card">

      <form id="healthForm">

        <div class="grid-2">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input class="form-control" type="text" id="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="age">Age</label>
            <input class="form-control" type="number" id="age" placeholder="e.g. 34" required min="1" max="120">
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="temperature">Temperature (°C)</label>
            <input class="form-control" type="number" id="temperature" placeholder="e.g. 36.8" step="0.1" required>
          </div>
          <div class="form-group">
            <label for="bp">Blood Pressure (mmHg)</label>
            <input class="form-control" type="number" id="bp" placeholder="e.g. 120" required>
          </div>
        </div>

        <div class="form-group">
          <label for="cough">Do you have a cough?</label>
          <select class="form-control" id="cough">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

        <div class="form-group">
          <label for="symptoms">Describe any symptoms</label>
          <input class="form-control" type="text" id="symptoms" placeholder="e.g. headache, fatigue, shortness of breath">
          <span class="form-hint">Leave blank if none</span>
        </div>

        <button class="btn btn-primary" type="submit" style="margin-top:4px;">
          Submit Health Data
        </button>

      </form>

      <!-- Result -->
      <div id="result" style="margin-top:20px;font-size:15px;font-weight:600;"></div>

    </div>
  </div>

</main>
</div>

<script src="../js/shared.js"></script>
<script src="../js/citizen.js"></script>
</body>
</html>
