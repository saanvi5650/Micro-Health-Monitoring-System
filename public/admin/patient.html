<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients — Admin Panel</title>
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

<div class="app-layout">
<aside class="sidebar">
  <div class="sidebar-brand">
    <h2>🏥 HealthMonitor</h2>
    <span class="role-badge">Admin</span>
  </div>
  <nav>
    <a href="admin-dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a href="patients.html" class="active"><span class="icon">👥</span> Patients</a>
    <a href="adalerts.html"><span class="icon">🚨</span> Alerts</a>
  </nav>
  <div class="sidebar-footer">
    <a href="#" onclick="logout()">🚪 Sign Out</a>
  </div>
</aside>

<main class="page-content">

  <div class="page-header">
    <div class="header-row">
      <div>
        <h1>Patient Management</h1>
        <p>View and manage all registered patients and their records.</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="flex-between mb-2">
      <h3 style="margin:0;">All Patients</h3>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="patientSearch" placeholder="Search by name…">
      </div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Patient Name</th>
            <th>Temperature</th>
            <th>Blood Pressure</th>
            <th>Risk Level</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="text-center" style="padding:32px;">
            <span class="spinner"></span>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>
</div>

<script src="../js/shared.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
